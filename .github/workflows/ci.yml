name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            numpy==2.1.3 \
            pandas==2.2.3 \
            scikit-learn==1.6.1 \
            tqdm==4.67.1 \
            pytest

      - name: Compile Python sources
        run: python -m compileall -q src scripts

      - name: Run unit tests
        # Discover and run every test_*.py / *_test.py under src/.
        # Root conftest.py puts src/ on sys.path, so PYTHONPATH is not needed.
        # --tb=short keeps failures readable; -ra summarises skips/xfails.
        run: pytest -q --tb=short -ra src/
